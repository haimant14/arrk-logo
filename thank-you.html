<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | ARRK Property Management LLC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f9fc;
      color: #1f2937;
    }

    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 20px 0 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .brand img {
      width: 120px;
      height: auto;
      margin: 0 0 8px 0;
    }

    .brand-text {
      text-align: center;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 32px;
      color: #1f3a6d;
      font-weight: 700;
    }

    .brand-text p {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 16px;
    }

    .section {
      background: #fff;
      padding: 30px;
      margin-top: 20px;
      border-radius: 12px;
      text-align: center;
    }

    h2 {
      color: #1f3a6d;
      margin-top: 0;
    }

    p {
      line-height: 1.6;
      color: #4b5563;
    }

    a.button {
      display: inline-block;
      margin-top: 16px;
      background: #1f3a6d;
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="wrap brand">
    <img src="ARRK_Web_Header_Cropped.png" alt="ARRK Logo">
    <div class="brand-text">
      <h1>ARRK Property Management LLC</h1>
      <p>Professional Rental Management</p>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="section">
    <h2>Thank You</h2>
    <p>Your maintenance request has been submitted successfully.</p>
    <p>We will review your request and be in contact as soon as possible.</p>
    <a class="button" href="https://www.arrkpm.com/">Return to Home</a>
  </div>
</div>

<footer>
  © 2026 ARRK Property Management LLC
</footer>

</body>
</html>
